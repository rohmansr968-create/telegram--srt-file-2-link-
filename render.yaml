services:
  - type: web
    name: srt-translator-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CHANNEL_USERNAME
        sync: false
      - key: RENDER_URL
        sync: false
